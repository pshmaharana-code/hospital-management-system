<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Doctor - HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('admin_dashboard') }}">HMS Admin</a>
        </div>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="{{ url_for('manage_doctors') }}">Manage Doctors</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('manage_patients') }}">Manage Patients</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('manage_appointments') }}">All Appointments</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Edit Doctor Details</h1>
        <hr>

        <form method="post">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ doctor.name }}" required>
            </div>
            <div class="mb-3">
                <label for="department_id" class="form-label">Department (Specialization)</label>
                <select class="form-control" name="department_id" id="department_id" required>
                    <option value="">Select a Department</option>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if dept.id == doctor.department_id %}selected{% endif %}>
                            {{ dept.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="contact" class="form-label">Contact Number</label>
                <input type="text" class="form-control" id="contact" name="contact" value="{{ doctor.contact }}">
            </div>
            <div class="mb-3">
                <label for="experience" class="form-label">Experience (Years)</label>
                <input type="number" class="form-control" id="experience" name="experience" value="{{ doctor.experience }}">
            </div>
            <div class="mb-3">
                <label for="qualification" class="form-label">Qualification</label>
                <input type="text" class="form-control" id="qualification" name="qualification" value="{{ doctor.qualification }}">
            </div>

            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="{{ url_for('manage_doctors') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
