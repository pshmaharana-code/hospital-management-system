{% extends "layout.html" %}

{% block title %}Edit Doctor - HMS{% endblock %}

{% block nav_links %}
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('manage_doctors') }}">Manage Doctors</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('manage_patients') }}">Manage Patients</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('manage_appointments') }}">All Appointments</a>
    </li>
{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h2 class="mb-0">Edit Doctor Details</h2>
                </div>
                <div class="card-body">
                    <form method="post">
                        <h4 class="mb-3">Doctor Details</h4>
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ doctor.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="department_id" class="form-label">Department (Specialization)</label>
                            <select class="form-control" name="department_id" id="department_id" required>
                                <option value="">Select a Department</option>
                                {% for dept in departments %}
                                    <option value="{{ dept.id }}" {% if dept.id == doctor.department_id %}selected{% endif %}>
                                        {{ dept.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="contact" class="form-label">Contact Number</label>
                            <input type="text" class="form-control" id="contact" name="contact" value="{{ doctor.contact }}">
                        </div>
                        <div class="mb-3">
                            <label for="experience" class="form-label">Experience (Years)</label>
                            <input type="number" class="form-control" id="experience" name="experience" value="{{ doctor.experience }}">
                        </div>
                        <div class="mb-3">
                            <label for="qualification" class="form-label">Qualification</label>
                            <input type="text" class="form-control" id="qualification" name="qualification" value="{{ doctor.qualification }}">
                        </div>

                        <hr class="my-4">
                        
                        <h4 class="mb-3">Login Credentials</h4>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username (Read-only)</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ doctor.user.username }}" readonly disabled>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('manage_doctors') }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
