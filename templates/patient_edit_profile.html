{% extends "layout.html" %}

{% block title %}Edit My Profile - HMS{% endblock %}

{% block nav_links %}{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Edit Your Profile</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" 
                                   value="{{ patient.name }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="contact" class="form-label">Contact Number</label>
                            <input type="text" class="form-control" id="contact" name="contact" 
                                   value="{{ patient.contact }}" required>
                        </div>
                        
                        <hr>
                        
                        <div class="mb-3">
                            <label for="username" class="form-label">Username (Read-only)</label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   value="{{ patient.user.username }}" readonly disabled>
                            <div class="form-text">Usernames cannot be changed.</div>
                        </div>
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('patient_dashboard') }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
