<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Complete -HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('doctor_dashboard') }}">Doctor Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h3 class="mb-0">Complete Appointment</h3>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title mb-4">
                            Patient: <strong>{{ appointment.patient.name }}</strong><br>
                            Date: {{ appointment.date.strftime('%b %d, %Y') }} at {{ appointment.time.strftime('%I:%M %p') }}
                        </h5>

                        <form method="POST">
                            <div class="mb-3">
                                <label for="diagnosis" class="form-label">Diagnosis</label>
                                <textarea class="form-control" id="diagnosis" name="diagnosis" rows="3" required></textarea>
                                <div class="form-text">What is the patient's condition?</div>
                            </div>
                            <div class="mb-3">
                                <label for="prescription" class="form-label">Prescription</label>
                                <textarea class="form-control" id="prescription" name="prescription" rows="3" required></textarea>
                                <div class="form-text">List medications and dosages.</div>
                            </div>
                            <div class="mb-4">
                                <label for="notes" class="form-label">Doctor's Notes</label>
                                <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                                <div class="form-text">Any additional observations or instructions.</div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="{{ url_for('doctor_dashboard') }}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-success">Save Treatment & Complete</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
