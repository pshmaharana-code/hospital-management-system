{% extends "layout.html" %}

{% block title %}Add Doctor - HMS{% endblock %}

{% block nav_links %}
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('manage_doctors') }}">Manage Doctors</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('manage_patients') }}">Manage Patients</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="{{ url_for('manage_appointments') }}">All Appointments</a>
    </li>
{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h2 class="mb-0">Add New Doctor</h2>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('add_doctor') }}" method="post">
                        <h4 class="mb-3">Doctor Details</h4>
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="department_id" class="form-label">Department (Specialization)</label>
                            <select class="form-control" id="department_id" name="department_id" required>
                                <option value="">Select a Department</option>
                                {% for dept in departments %}
                                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="contact" class="form-label">Contact Number</label>
                            <input type="text" class="form-control" id="contact" name="contact">
                        </div>
                        <div class="mb-3">
                            <label for="experience" class="form-label">Experience (Years)</label>
                            <input type="number" class="form-control" id="experience" name="experience">
                        </div>
                        <div class="mb-3">
                            <label for="qualification" class="form-label">Qualification (e.g., MD, MBBS)</label>
                            <input type="text" class="form-control" id="qualification" name="qualification">
                        </div> 

                        <hr class="my-4">

                        <h4 class="mb-3">Login Credentials</h4>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('manage_doctors') }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success">Create Doctor</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
